<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Subash Muthu B | Professional Web Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(77, 171, 247, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .container {
            text-align: center;
            padding: 4rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 8px 32px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            margin: 2rem;
            position: relative;
            z-index: 2;
            animation: fadeInUp 1s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00d4ff 0%, #4dabf7 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
            animation: successPulse 2s ease-in-out infinite;
        }
        
        .success-icon::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            animation: successRing 2s ease-in-out infinite;
        }
        
        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes successRing {
            0%, 100% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.5;
                transform: scale(1.1);
            }
        }
        
        .success-icon i {
            font-size: 3rem;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            margin-bottom: 1.5rem;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        
        .subtitle {
            font-size: 1.3rem;
            color: #00d4ff;
            font-weight: 600;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .message {
            margin-bottom: 2.5rem;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #e0e0e0;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .response-time {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        
        .response-time i {
            color: #00d4ff;
            font-size: 1.5rem;
        }
        
        .response-time span {
            color: #ffffff;
            font-weight: 600;
        }
        
        .action-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2.5rem;
        }
        
        .btn {
            padding: 1.2rem 2.5rem;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            min-width: 180px;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
            z-index: 1;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn span {
            position: relative;
            z-index: 2;
        }
        
        .btn i {
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
        }
        
        .btn:hover i {
            transform: scale(1.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #4dabf7 50%, #0ea5e9 100%);
            color: #ffffff;
            border: 2px solid rgba(0, 212, 255, 0.3);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 50%, #0369a1 100%);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.5);
            color: #ffffff;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #00d4ff;
            border: 2px solid #00d4ff;
            backdrop-filter: blur(10px);
        }
        
        .btn-secondary:hover {
            background: #00d4ff;
            color: #000000;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
            border-color: #00d4ff;
        }
        
        .social-links {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .social-links p {
            color: #b3b3b3;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        
        .social-icons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        
        .social-link {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00d4ff;
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background: #00d4ff;
            color: #000000;
            transform: translateY(-5px) rotate(360deg);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.5);
            border-color: #00d4ff;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 1rem;
                padding: 2.5rem 1.5rem;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .subtitle {
                font-size: 1.1rem;
            }
            
            .message {
                font-size: 1.1rem;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                min-width: 250px;
            }
            
            .response-time {
                flex-direction: column;
                text-align: center;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1>Message Received!</h1>
        <p class="subtitle">Thank You for Reaching Out</p>
        <div class="message">
            <p>Your project inquiry has been successfully submitted. I appreciate your interest in working together and will review your requirements carefully.</p>
        </div>
        
        <div class="response-time">
            <i class="fas fa-clock"></i>
            <span>Expected Response Time: Within 24 Hours</span>
        </div>
        
        <div class="action-buttons">
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-home"></i>
                <span>Back to Portfolio</span>
            </a>
            <a href="index.html#work" class="btn btn-secondary">
                <i class="fas fa-folder-open"></i>
                <span>View My Work</span>
            </a>
        </div>
        
        <div class="social-links">
            <p>Connect with me while you wait:</p>
            <div class="social-icons">
                <a href="https://github.com/subashmuthub" target="_blank" class="social-link" aria-label="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/subash-muthu-b-8a5587349" target="_blank" class="social-link" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://x.com/_subash13" target="_blank" class="social-link" aria-label="Twitter">
                    <i class="fab fa-twitter"></i>
                </a>
                <a href="https://www.instagram.com/_subash13._" target="_blank" class="social-link" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
